
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{font-family:var(--font-sans);padding:8px 0}
.tabs{display:flex;gap:3px;background:var(--color-background-secondary);border-radius:10px;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;border:none;background:transparent;color:var(--color-text-secondary);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab.on{background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary)}
.map-wrap{position:relative;width:100%;height:380px;border-radius:10px;border:0.5px solid var(--color-border-tertiary);overflow:hidden;background:var(--color-background-secondary);cursor:grab}
.map-wrap.gr{cursor:grabbing}
#study-svg,#game-svg{position:absolute;top:0;left:0;width:100%;height:100%}
.zoom-bar{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:3px;z-index:10}
.zb{width:28px;height:28px;border-radius:7px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.zb:hover{background:var(--color-background-secondary)}
.tip-float{position:absolute;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:500;color:var(--color-text-primary);pointer-events:none;display:none;z-index:20;white-space:nowrap;max-width:200px}
.filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.fb{padding:4px 10px;font-size:11px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .1s}
.fb.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.legend{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.lsq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.game-layout{display:grid;grid-template-columns:1fr 220px;gap:10px;align-items:start}
.sidebar{display:flex;flex-direction:column;gap:8px}
.scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sc{background:var(--color-background-secondary);border-radius:8px;padding:8px 6px;text-align:center}
.sc-n{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.sc-l{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.answers-box{border:0.5px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;background:var(--color-background-primary)}
.answers-header{padding:8px 10px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;font-weight:500;color:var(--color-text-secondary);display:flex;justify-content:space-between;align-items:center}
.answers-list{max-height:250px;overflow-y:auto}
.ans-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:0.5px solid var(--color-border-tertiary);transition:background .1s}
.ans-row:last-child{border-bottom:none}
.ans-row.hl{background:var(--color-background-secondary)}
.ans-num{font-size:11px;font-weight:500;color:var(--color-text-secondary);min-width:18px;text-align:right;flex-shrink:0}
.ans-inp{flex:1;font-size:11px;padding:3px 6px;border-radius:5px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);outline:none;min-width:0;transition:border .15s}
.ans-inp:focus{border-color:#1D9E75}
.ans-inp.ok{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.ans-inp.bad{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.ans-check{width:16px;height:16px;flex-shrink:0;font-size:12px;display:flex;align-items:center;justify-content:center}
.btn-row{display:flex;flex-direction:column;gap:5px}
.bp{padding:8px;border-radius:8px;border:none;background:#1D9E75;color:#E1F5EE;font-size:12px;font-weight:500;cursor:pointer;text-align:center}
.bp:hover{opacity:.85}
.bs{padding:8px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:12px;cursor:pointer;text-align:center}
.bs:hover{background:var(--color-background-secondary)}
.result-pill{background:#E1F5EE;color:#085041;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:500;text-align:center;display:none}
.hint-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.55);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;pointer-events:none;white-space:nowrap}
</style>

<h2 class="sr-only">Juego de geografía: aprende los 100 países</h2>
<div id="app">
  <div class="tabs">
    <button class="tab on" onclick="switchTab('study',this)"><i class="ti ti-book" aria-hidden="true"></i> Estudiar</button>
    <button class="tab" onclick="switchTab('game',this)"><i class="ti ti-trophy" aria-hidden="true"></i> Jugar</button>
  </div>

  <div id="s-study">
    <div class="filters">
      <button class="fb on" onclick="sfilt('all',this)">Todos</button>
      <button class="fb" onclick="sfilt('europa',this)">Europa</button>
      <button class="fb" onclick="sfilt('africa',this)">África</button>
      <button class="fb" onclick="sfilt('asia',this)">Asia</button>
      <button class="fb" onclick="sfilt('america',this)">América</button>
      <button class="fb" onclick="sfilt('oceania',this)">Oceanía</button>
    </div>
    <div class="map-wrap" id="swrap">
      <svg id="study-svg" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="zoom-bar">
        <button class="zb" onclick="zm('s',1.35)">+</button>
        <button class="zb" onclick="zm('s',1/1.35)">−</button>
        <button class="zb" onclick="zr('s')" style="font-size:13px">↺</button>
      </div>
      <div class="tip-float" id="stip"></div>
      <div class="hint-bar">Arrastra · Rueda para zoom · Pasa el cursor sobre un país</div>
    </div>
    <div class="legend" style="margin-top:6px">
      <div class="leg"><div class="lsq" style="background:#1D9E75"></div>En negrita (100)</div>
      <div class="leg"><div class="lsq" style="background:#B4B2A9"></div>Resto</div>
    </div>
  </div>

  <div id="s-game" style="display:none">
    <div class="game-layout">
      <div>
        <div class="map-wrap" id="gwrap">
          <svg id="game-svg" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="zoom-bar">
            <button class="zb" onclick="zm('g',1.35)">+</button>
            <button class="zb" onclick="zm('g',1/1.35)">−</button>
            <button class="zb" onclick="zr('g')" style="font-size:13px">↺</button>
          </div>
          <div class="tip-float" id="gtip"></div>
          <div class="hint-bar" id="ghint">Haz clic en un país para seleccionarlo</div>
        </div>
        <div class="legend" style="margin-top:6px">
          <div class="leg"><div class="lsq" style="background:#5DCAA5"></div>Por identificar</div>
          <div class="leg"><div class="lsq" style="background:#1D9E75"></div>Correcto</div>
          <div class="leg"><div class="lsq" style="background:#E24B4A"></div>Incorrecto</div>
          <div class="leg"><div class="lsq" style="background:#FAC775"></div>Seleccionado</div>
        </div>
      </div>
      <div class="sidebar">
        <div class="scoreboard">
          <div class="sc"><div class="sc-n" id="gc">0</div><div class="sc-l">Correctas</div></div>
          <div class="sc"><div class="sc-n" id="gw">0</div><div class="sc-l">Errores</div></div>
          <div class="sc"><div class="sc-n" id="gp">0</div><div class="sc-l">Puntos</div></div>
          <div class="sc"><div class="sc-n" id="gpct">0%</div><div class="sc-l">Completado</div></div>
        </div>
        <div class="answers-box">
          <div class="answers-header">
            <span>Lista de países</span>
            <span id="ans-counter" style="font-size:10px">0/100</span>
          </div>
          <div class="answers-list" id="alist"></div>
        </div>
        <div class="btn-row">
          <button class="bp" onclick="checkAll()"><i class="ti ti-check" aria-hidden="true"></i> Comprobar todo</button>
          <button class="bs" onclick="revealAll()"><i class="ti ti-eye" aria-hidden="true"></i> Ver solución</button>
          <button class="bs" onclick="resetGame()"><i class="ti ti-refresh" aria-hidden="true"></i> Nueva partida</button>
        </div>
        <div class="result-pill" id="rpill"></div>
      </div>
    </div>
  </div>
</div>

const RM = {
  "Germany":"europa","Austria":"europa","Belgium":"europa","Belarus":"europa",
  "Bosnia and Herz.":"europa","Bulgaria":"europa","Croatia":"europa","Denmark":"europa",

  "Lithuania":"europa","Luxembourg":"europa","Malta":"europa","Monaco":"europa",
  "Netherlands":"europa","Norway":"europa","Poland":"europa","Portugal":"europa",
  "United Kingdom":"europa","Czech Rep.":"europa","Romania":"europa","Russia":"europa",
  "Serbia":"europa","Sweden":"europa","Switzerland":"europa","Ukraine":"europa","Vatican":"europa",
  "Algeria":"africa","Cameroon":"africa","Cape Verde":"africa","Chad":"africa",

  "Nigeria":"africa","Central African Rep.":"africa","Congo":"africa",
  "Dem. Rep. Congo":"africa","South Africa":"africa","Senegal":"africa",
  "Somalia":"africa","Sudan":"africa","S. Sudan":"africa","Tanzania":"africa",
  "Tunisia":"africa","Uganda":"africa","Swaziland":"africa",
  "Afghanistan":"asia","Saudi Arabia":"asia","Bangladesh":"asia","China":"asia",
  "North Korea":"asia","South Korea":"asia","United Arab Emirates":"asia",
  "Philippines":"asia","India":"asia","Indonesia":"asia","Iraq":"asia","Iran":"asia",
  "Israel":"asia","Japan":"asia","Jordan":"asia","Kuwait":"asia","Lebanon":"asia",
  "Malaysia":"asia","Maldives":"asia","Mongolia":"asia","Nepal":"asia",
  "Pakistan":"asia","Sri Lanka":"asia","Syria":"asia","Thailand":"asia",
  "Turkey":"asia","Vietnam":"asia",
  "Argentina":"america","Bolivia":"america","Brazil":"america","Canada":"america",
  "Chile":"america","Colombia":"america","Costa Rica":"america","Cuba":"america",
  "Dominican Rep.":"america","Ecuador":"america","Guatemala":"america",
  "Honduras":"america","Mexico":"america","Nicaragua":"america","Panama":"america",
  "Paraguay":"america","Peru":"america","United States of America":"america",
  "Uruguay":"america","Venezuela":"america",
  "Australia":"oceania","New Zealand":"oceania","Micronesia":"oceania"
};
const TARGET = new Set(Object.keys(CE));
const norm = s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
const isDark = matchMedia('(prefers-color-scheme:dark)').matches;

let WD = null;
let sFilter = 'all';
let gNums = {}, gState = {};
let selectedNum = null;
let T = {s:{k:1,x:0,y:0}, g:{k:1,x:0,y:0}};
let drag = {s:false, g:false};
let ds0 = {};

function switchTab(t, btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('s-study').style.display = t==='study'?'block':'none';
  document.getElementById('s-game').style.display = t==='game'?'block':'none';
}

function getT(id){ return `translate(${T[id].x},${T[id].y}) scale(${T[id].k})`; }
function applyT(id){ const g=document.getElementById(id+'g'); if(g) g.setAttribute('transform',getT(id)); }
function zm(id, f){
  T[id].k = Math.min(10, Math.max(1, T[id].k*f));
  applyT(id);
  if(id==='g') updateNumLabels();
}
function zr(id){ T[id]={k:1,x:0,y:0}; applyT(id); if(id==='g') updateNumLabels(); }

function setupDrag(id, wrapId){
  const el = document.getElementById(wrapId);
  el.addEventListener('mousedown', e=>{
    if(e.target.closest('.zoom-bar')) return;
    drag[id]=true; ds0[id]={x:e.clientX-T[id].x, y:e.clientY-T[id].y};
    el.classList.add('gr');
  });
  window.addEventListener('mousemove', e=>{
    if(!drag[id]) return;
    T[id].x=e.clientX-ds0[id].x; T[id].y=e.clientY-ds0[id].y;
    applyT(id); if(id==='g') updateNumLabels();
  });
  window.addEventListener('mouseup', ()=>{ drag[id]=false; el.classList.remove('gr'); });
  el.addEventListener('wheel', e=>{
    e.preventDefault();
    const f = e.deltaY<0?1.15:1/1.15;
    const rect = el.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const svgW = rect.width, svgH = rect.height;
    const px = (mx - T[id].x) / T[id].k;
    const py = (my - T[id].y) / T[id].k;
    T[id].k = Math.min(10, Math.max(1, T[id].k*f));
    T[id].x = mx - px * T[id].k;
    T[id].y = my - py * T[id].k;
    applyT(id); if(id==='g') updateNumLabels();
  },{passive:false});
}

function buildStudyMap(feats, pf){
  const svg = d3.select('#study-svg');
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('id','sg');
  const tip = document.getElementById('stip');
  const wrap = document.getElementById('swrap');

  g.selectAll('path').data(feats).join('path')
    .attr('d', pf)
    .attr('fill', d=>getFillStudy(d.properties&&d.properties.name))
    .attr('opacity', d=>getOpStudy(d.properties&&d.properties.name))
    .attr('stroke', isDark?'rgba(255,255,255,0.13)':'#fff')
    .attr('stroke-width', 0.4)
    .style('cursor', d=>TARGET.has(d.properties&&d.properties.name)?'pointer':'default')
    .on('mousemove', function(ev,d){
      const n=d.properties&&d.properties.name;
      const es=CE[n]; if(!es) return;
      d3.select(this).attr('fill','#FAC775');
      const r=wrap.getBoundingClientRect();
      tip.style.left=(ev.clientX-r.left+12)+'px';
      tip.style.top=(ev.clientY-r.top-32)+'px';
      tip.style.display='block'; tip.textContent=es;
    })
    .on('mouseleave', function(ev,d){
      const n=d.properties&&d.properties.name;
      d3.select(this).attr('fill',getFillStudy(n)).attr('opacity',getOpStudy(n));
      tip.style.display='none';
    });

  const tf = feats.filter(d=>TARGET.has(d.properties&&d.properties.name));
  g.selectAll('text.sl').data(tf).join('text')
    .attr('class','sl')
    .attr('transform',d=>{ const c=pf.centroid(d); return `translate(${c[0]},${c[1]})`; })
    .attr('text-anchor','middle').attr('dy','0.35em')
    .style('font-size','5.5px').style('font-family','var(--font-sans)')
    .style('fill',isDark?'#fff':'#04342C').style('font-weight','500')
    .style('pointer-events','none').style('paint-order','stroke')
    .style('stroke',isDark?'#085041':'#E1F5EE').style('stroke-width','2.5px')
    .text(d=>{ const es=CE[d.properties.name]||''; return es.length>14?es.split(' ').slice(0,2).join(' '):es; });
}

function getFillStudy(n){
  if(!TARGET.has(n)) return isDark?'#3a3a38':'#D3D1C7';
  if(sFilter!=='all' && RM[n]!==sFilter) return isDark?'#1a3a2a':'#9FE1CB';
  return '#1D9E75';
}
function getOpStudy(n){
  if(!TARGET.has(n)) return 1;
  if(sFilter==='all') return 1;
  return RM[n]===sFilter?1:0.28;
}

function sfilt(r, btn){
  sFilter=r;
  document.querySelectorAll('#s-study .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(WD){ buildStudyMap(WD.feats, WD.pf); applyT('s'); }
}

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function buildGameMap(feats, pf){
  const svg = d3.select('#game-svg');
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('id','gg');
  const tip = document.getElementById('gtip');
  const wrap = document.getElementById('gwrap');
  const tg = feats.filter(d=>TARGET.has(d.properties&&d.properties.name));
  const shuffled = shuffle(tg);
  gNums={}; gState={};
  shuffled.forEach((f,i)=>{ gNums[f.properties.name]=i+1; });

  g.selectAll('path').data(feats).join('path')
    .attr('d',pf)
    .attr('fill',d=>TARGET.has(d.properties&&d.properties.name)?'#5DCAA5':(isDark?'#3a3a38':'#D3D1C7'))
    .attr('stroke',isDark?'rgba(255,255,255,0.13)':'#fff')
    .attr('stroke-width',0.4)
    .attr('id',d=>{ const n=d.properties&&d.properties.name; return TARGET.has(n)?'gpath-'+gNums[n]:''; })
    .style('cursor',d=>TARGET.has(d.properties&&d.properties.name)?'pointer':'default')
    .on('click', function(ev,d){
      const n=d.properties&&d.properties.name;
      if(!TARGET.has(n)) return;
      const num=gNums[n];
      if(gState[num]==='correct') return;
      selectNum(num);
    })
    .on('mousemove', function(ev,d){
      const n=d.properties&&d.properties.name;
      if(!TARGET.has(n)) return;
      const num=gNums[n];
      const r=wrap.getBoundingClientRect();
      tip.style.left=(ev.clientX-r.left+12)+'px';
      tip.style.top=(ev.clientY-r.top-32)+'px';
      tip.style.display='block';
      if(gState[num]==='correct') tip.textContent='✓ '+CE[n];
      else tip.textContent='País #'+num;
    })
    .on('mouseleave',()=>tip.style.display='none');

  const labsG = g.append('g').attr('id','num-labels');
  tg.forEach(f=>{
    const n=f.properties.name;
    const num=gNums[n];
    const c=pf.centroid(f);
    if(isNaN(c[0])||isNaN(c[1])) return;
    const fg=labsG.append('g').attr('id','glbl-'+num).attr('transform',`translate(${c[0]},${c[1]})`).style('pointer-events','none');
    fg.append('rect').attr('id','glbg-'+num).attr('rx',1.5).attr('fill','rgba(255,255,255,0.9)');
    fg.append('text').attr('id','gltxt-'+num).attr('text-anchor','middle').attr('dominant-baseline','central')
      .style('font-family','var(--font-sans)').style('fill','#085041').style('font-weight','600');
  });
  updateNumLabels();
  buildAnswerList();
  updateStats();
  selectedNum=null;
  document.getElementById('rpill').style.display='none';
}

function updateNumLabels(){
  const k = T.g.k;
  const baseSize = 5.5;
  const sz = Math.max(3, baseSize / k);
  const pad = sz * 0.5;
  Object.entries(gNums).forEach(([n,num])=>{
    const txt = document.getElementById('gltxt-'+num);
    const bg = document.getElementById('glbg-'+num);
    if(!txt||!bg) return;
    const label = String(num);
    txt.style.fontSize = sz+'px';
    txt.textContent = label;
    const w = label.length>2 ? sz*3.2 : sz*2.4;
    const h = sz*1.6;
    bg.setAttribute('x',-w/2); bg.setAttribute('y',-h/2);
    bg.setAttribute('width',w); bg.setAttribute('height',h);
  });
}

function selectNum(num){
  selectedNum=num;
  document.querySelectorAll('[id^="gpath-"]').forEach(el=>{
    const n2=parseInt(el.id.replace('gpath-',''));
    if(gState[n2]==='correct') return;
    if(gState[n2]==='wrong'){ el.setAttribute('fill','#E24B4A'); return; }
    el.setAttribute('fill', n2===num?'#FAC775':'#5DCAA5');
  });
  const row = document.getElementById('arow-'+num);
  if(row){
    row.scrollIntoView({block:'nearest',behavior:'smooth'});
    document.querySelectorAll('.ans-row').forEach(r=>r.classList.remove('hl'));
    row.classList.add('hl');
    const inp = document.getElementById('ainp-'+num);
    if(inp && gState[num]!=='correct') inp.focus();
  }
  document.getElementById('ghint').textContent = 'País #'+num+' seleccionado — escribe el nombre a la derecha';
}

function buildAnswerList(){
  const list = document.getElementById('alist');
  list.innerHTML='';
  const sorted = Object.entries(gNums).sort((a,b)=>a[1]-b[1]);
  sorted.forEach(([eng,num])=>{
    const es=CE[eng];
    const row=document.createElement('div');
    row.className='ans-row'; row.id='arow-'+num;
    row.innerHTML=`<span class="ans-num">${num}.</span><input class="ans-inp" id="ainp-${num}" data-eng="${eng}" data-es="${es}" placeholder="Escribe aquí..." autocomplete="off" spellcheck="false"><span class="ans-check" id="achk-${num}"></span>`;
    list.appendChild(row);
    const inp=row.querySelector('input');
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ checkOne(num); }
    });
    inp.addEventListener('focus',()=>{
      if(gState[num]==='correct') return;
      selectNum(num);
    });
    inp.addEventListener('input',()=>{
      if(gState[num]) return;
      inp.classList.remove('ok','bad');
      document.getElementById('achk-'+num).textContent='';
    });
    row.addEventListener('click',()=>{
      if(gState[num]==='correct') return;
      selectNum(num);
    });
  });
}

function checkOne(num){
  const inp=document.getElementById('ainp-'+num);
  if(!inp) return;
  const es=inp.dataset.es;
  const val=inp.value.trim();
  if(!val) return;
  const ok=norm(val)===norm(es);
  gState[num]=ok?'correct':'wrong';
  inp.classList.toggle('ok',ok); inp.classList.toggle('bad',!ok);
  inp.disabled=ok;
  document.getElementById('achk-'+num).textContent=ok?'✓':'✗';
  document.getElementById('achk-'+num).style.color=ok?'#1D9E75':'#E24B4A';
  const path=document.getElementById('gpath-'+num);
  if(path) path.setAttribute('fill',ok?'#1D9E75':'#E24B4A');
  if(!ok){ setTimeout(()=>{ inp.classList.remove('bad'); inp.disabled=false; document.getElementById('achk-'+num).textContent=''; gState[num]=null; const p2=document.getElementById('gpath-'+num); if(p2) p2.setAttribute('fill',selectedNum===num?'#FAC775':'#5DCAA5'); }, 900); }
  updateStats();
  if(ok && selectedNum===num){ const next=findNextUnanswered(num); if(next) selectNum(next); }
}

function findNextUnanswered(from){
  const nums=Object.values(gNums).sort((a,b)=>a-b);
  const idx=nums.indexOf(from);
  for(let i=idx+1;i<nums.length;i++){ if(gState[nums[i]]!=='correct') return nums[i]; }
  for(let i=0;i<idx;i++){ if(gState[nums[i]]!=='correct') return nums[i]; }
  return null;
}

function checkAll(){
  Object.values(gNums).sort((a,b)=>a-b).forEach(num=>{
    if(gState[num]!=='correct') checkOne(num);
  });
  showResult();
}

function revealAll(){
  Object.entries(gNums).forEach(([eng,num])=>{
    if(gState[num]==='correct') return;
    const inp=document.getElementById('ainp-'+num);
    if(inp){ inp.value=CE[eng]; inp.classList.add('ok'); inp.classList.remove('bad'); inp.disabled=true; }
    document.getElementById('achk-'+num).textContent='✓';
    document.getElementById('achk-'+num).style.color='#1D9E75';
    gState[num]='correct';
    const p=document.getElementById('gpath-'+num);
    if(p) p.setAttribute('fill','#1D9E75');
  });
  updateStats(); showResult();
}

function resetGame(){
  T.g={k:1,x:0,y:0}; applyT('g');
  if(WD) buildGameMap(WD.feats, WD.pf);
}

function updateStats(){
  const ok=Object.values(gState).filter(v=>v==='correct').length;
  const bad=Object.values(gState).filter(v=>v==='wrong').length;
  const pts=Math.max(0,ok*10-bad*3);
  document.getElementById('gc').textContent=ok;
  document.getElementById('gw').textContent=bad;
  document.getElementById('gp').textContent=pts;
  document.getElementById('gpct').textContent=Math.round(ok/100*100)+'%';
  document.getElementById('ans-counter').textContent=ok+'/100';
}

function showResult(){
  const ok=Object.values(gState).filter(v=>v==='correct').length;
  const pill=document.getElementById('rpill');
  pill.style.display='block';
  pill.textContent=ok+'/100 correctas · '+Math.max(0,ok*10)+ ' puntos';
}

setupDrag('s','swrap');
setupDrag('g','gwrap');

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
  const feats=topojson.feature(world,world.objects.countries).features;
  const proj=d3.geoNaturalEarth1().scale(153).translate([480,250]);
  const pf=d3.geoPath(proj);
  WD={feats,pf};
  buildStudyMap(feats,pf);
  buildGameMap(feats,pf);
});
</script>
