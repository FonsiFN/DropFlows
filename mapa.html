
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#app{padding:12px 0}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:4px}
.tab{flex:1;padding:8px 0;text-align:center;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--border-radius-md);border:none;background:transparent;color:var(--color-text-secondary);transition:all .15s}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary)}
.screen{display:none}
.screen.active{display:block}
.map-container{position:relative;width:100%;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden;cursor:grab}
.map-container.grabbing{cursor:grabbing}
#study-svg,#game-svg{display:block;width:100%;transition:none}
.zoom-btns{display:flex;flex-direction:column;gap:4px;position:absolute;top:10px;right:10px}
.zoom-btn{width:32px;height:32px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:500}
.zoom-btn:hover{background:var(--color-background-secondary)}
.legend-row{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-sq{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.answers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;margin-top:14px;max-height:260px;overflow-y:auto;padding-right:4px}
.answer-row{display:flex;align-items:center;gap:6px}
.ans-num{font-size:12px;font-weight:500;color:var(--color-text-secondary);min-width:22px;text-align:right}
.ans-input{flex:1;font-size:12px;padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;transition:border .15s}
.ans-input:focus{border-color:#1D9E75}
.ans-input.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.ans-input.wrong{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.btn-primary{padding:9px 20px;border-radius:var(--border-radius-md);border:none;background:#1D9E75;color:#E1F5EE;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-sec{padding:9px 20px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:14px;cursor:pointer}
.btn-sec:hover{background:var(--color-background-secondary)}
.action-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.score-badge{display:inline-block;padding:4px 12px;border-radius:var(--border-radius-md);background:#E1F5EE;color:#085041;font-size:13px;font-weight:500}
.tip{font-size:11px;color:var(--color-text-secondary);margin-top:6px}
.filter-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:4px 10px;font-size:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.filter-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.tooltip-float{position:absolute;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 12px;font-size:13px;font-weight:500;color:var(--color-text-primary);pointer-events:none;display:none;z-index:50;white-space:nowrap}
</style>

<h2 class="sr-only">Juego interactivo: aprende los 100 países en el mapa</h2>
<div id="app">
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('study')"><i class="ti ti-book" aria-hidden="true"></i> Estudiar</button>
    <button class="tab" onclick="switchTab('game')"><i class="ti ti-trophy" aria-hidden="true"></i> Jugar</button>
  </div>

  <div id="screen-study" class="screen active">
    <div class="filter-row">
      <button class="filter-btn active" onclick="studyFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="studyFilter('europa',this)">Europa</button>
      <button class="filter-btn" onclick="studyFilter('africa',this)">África</button>
      <button class="filter-btn" onclick="studyFilter('asia',this)">Asia</button>
      <button class="filter-btn" onclick="studyFilter('america',this)">América</button>
      <button class="filter-btn" onclick="studyFilter('oceania',this)">Oceanía</button>
    </div>
    <div class="map-container" id="study-container">
      <svg id="study-svg" viewBox="0 0 960 500"></svg>
      <div class="zoom-btns">
        <button class="zoom-btn" onclick="zoomMap('study',1.4)" aria-label="Ampliar">+</button>
        <button class="zoom-btn" onclick="zoomMap('study',1/1.4)" aria-label="Reducir">−</button>
        <button class="zoom-btn" onclick="resetZoom('study')" aria-label="Resetear" style="font-size:13px">↺</button>
      </div>
      <div class="tooltip-float" id="study-tip"></div>
    </div>
    <div class="legend-row">
      <div class="leg"><div class="leg-sq" style="background:#1D9E75"></div>En negrita (100)</div>
      <div class="leg"><div class="leg-sq" style="background:#D3D1C7"></div>Resto del mundo</div>
      <div class="leg"><i class="ti ti-zoom-in" style="font-size:13px" aria-hidden="true"></i> Arrastra y usa +/− para navegar</div>
    </div>
  </div>

  <div id="screen-game" class="screen">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-n" id="g-correct">0</div><div class="stat-l">Correctas</div></div>
      <div class="stat-card"><div class="stat-n" id="g-wrong">0</div><div class="stat-l">Errores</div></div>
      <div class="stat-card"><div class="stat-n" id="g-score">0</div><div class="stat-l">Puntos</div></div>
      <div class="stat-card"><div class="stat-n" id="g-pct">0%</div><div class="stat-l">Completado</div></div>
    </div>
    <div class="map-container" id="game-container">
      <svg id="game-svg" viewBox="0 0 960 500"></svg>
      <div class="zoom-btns">
        <button class="zoom-btn" onclick="zoomMap('game',1.4)" aria-label="Ampliar">+</button>
        <button class="zoom-btn" onclick="zoomMap('game',1/1.4)" aria-label="Reducir">−</button>
        <button class="zoom-btn" onclick="resetZoom('game')" aria-label="Resetear" style="font-size:13px">↺</button>
      </div>
      <div class="tooltip-float" id="game-tip"></div>
    </div>
    <p class="tip" style="margin-top:6px">Escribe el nombre del país junto a su número. Pulsa Enter para validar cada respuesta.</p>
    <div class="answers-grid" id="answers-grid"></div>
    <div class="action-row">
      <button class="btn-primary" onclick="checkAll()"><i class="ti ti-check" aria-hidden="true"></i> Comprobar todo</button>
      <button class="btn-sec" onclick="revealAll()"><i class="ti ti-eye" aria-hidden="true"></i> Ver solución</button>
      <button class="btn-sec" onclick="resetGame()"><i class="ti ti-refresh" aria-hidden="true"></i> Nueva partida</button>
      <span class="score-badge" id="final-badge" style="display:none"></span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const COUNTRIES_ES = {

  "North Korea":"Corea del Norte","South Korea":"Corea del Sur","Costa Rica":"Costa Rica",
  "Croatia":"Croacia","Cuba":"Cuba","Denmark":"Dinamarca","Ecuador":"Ecuador",

  "Slovenia":"Eslovenia","Spain":"España","United States of America":"Estados Unidos",

  "Eq. Guinea":"Guinea Ecuatorial","Honduras":"Honduras","Hungary":"Hungría",
  "India":"India","Indonesia":"Indonesia","Iraq":"Irak","Iran":"Irán",
  "Ireland":"Irlanda","Iceland":"Islandia","Israel":"Israel","Italy":"Italia",
  "Japan":"Japón","Jordan":"Jordania","Kenya":"Kenia","Kuwait":"Kuwait",
  "Latvia":"Letonia","Lebanon":"Líbano","Liberia":"Liberia","Libya":"Libia",
  "Lithuania":"Lituania","Luxembourg":"Luxemburgo","Madagascar":"Madagascar",
  "Malaysia":"Malasia","Maldives":"Maldivas","Mali":"Malí","Malta":"Malta",

  "Micronesia":"Micronesia","Monaco":"Mónaco","Mongolia":"Mongolia",
  "Mozambique":"Mozambique","Nepal":"Nepal","Nicaragua":"Nicaragua",
  "Niger":"Níger","Nigeria":"Nigeria","Norway":"Noruega","New Zealand":"Nueva Zelanda",
  "Netherlands":"Países Bajos","Pakistan":"Pakistán","Panama":"Panamá",
  "Paraguay":"Paraguay","Peru":"Perú","Poland":"Polonia","Portugal":"Portugal",
  "United Kingdom":"Reino Unido","Central African Rep.":"República Centroafricana",
  "Czech Rep.":"República Checa","Congo":"República del Congo",
  "Dem. Rep. Congo":"República Democrática del Congo",
  "Dominican Rep.":"República Dominicana","South Africa":"República Sudafricana",
  "Romania":"Rumanía","Russia":"Rusia","Senegal":"Senegal","Serbia":"Serbia",
  "Syria":"Siria","Somalia":"Somalia","Sri Lanka":"Sri Lanka","Swaziland":"Suazilandia",
  "Sudan":"Sudán","S. Sudan":"Sudán del Sur","Sweden":"Suecia","Switzerland":"Suiza",
  "Thailand":"Tailandia","Tanzania":"Tanzania","Tunisia":"Túnez","Turkey":"Turquía",
  "Ukraine":"Ucrania","Uganda":"Uganda","Uruguay":"Uruguay","Venezuela":"Venezuela",
  "Vietnam":"Vietnam"
};
const REGION_MAP = {
  "Germany":"europa","Austria":"europa","Belgium":"europa","Belarus":"europa",
  "Bosnia and Herz.":"europa","Bulgaria":"europa","Croatia":"europa","Denmark":"europa",
  "Slovakia":"europa","Slovenia":"europa","Spain":"europa","Estonia":"europa",
  "Finland":"europa","France":"europa","Greece":"europa","Hungary":"europa",
  "Ireland":"europa","Iceland":"europa","Italy":"europa","Latvia":"europa",
  "Lithuania":"europa","Luxembourg":"europa","Malta":"europa","Monaco":"europa",
  "Netherlands":"europa","Norway":"europa","Poland":"europa","Portugal":"europa",
  "United Kingdom":"europa","Czech Rep.":"europa","Romania":"europa","Russia":"europa",
  "Serbia":"europa","Sweden":"europa","Switzerland":"europa","Ukraine":"europa","Vatican":"europa",
  "Algeria":"africa","Cameroon":"africa","Cape Verde":"africa","Chad":"africa",
  "Eq. Guinea":"africa","Ethiopia":"africa","Guinea":"africa","Kenya":"africa",
  "Liberia":"africa","Libya":"africa","Madagascar":"africa","Mali":"africa",
  "Mauritania":"africa","Morocco":"africa","Mozambique":"africa","Niger":"africa",
  "Nigeria":"africa","Central African Rep.":"africa","Congo":"africa",
  "Dem. Rep. Congo":"africa","South Africa":"africa","Senegal":"africa",
  "Somalia":"africa","Sudan":"africa","S. Sudan":"africa","Tanzania":"africa",
  "Tunisia":"africa","Uganda":"africa","Swaziland":"africa",
  "Afghanistan":"asia","Saudi Arabia":"asia","Bangladesh":"asia","China":"asia",
  "North Korea":"asia","South Korea":"asia","United Arab Emirates":"asia",
  "Philippines":"asia","India":"asia","Indonesia":"asia","Iraq":"asia","Iran":"asia",
  "Israel":"asia","Japan":"asia","Jordan":"asia","Kuwait":"asia","Lebanon":"asia",
  "Malaysia":"asia","Maldives":"asia","Mongolia":"asia","Nepal":"asia",
  "Pakistan":"asia","Sri Lanka":"asia","Syria":"asia","Thailand":"asia",
  "Turkey":"asia","Vietnam":"asia",
  "Argentina":"america","Bolivia":"america","Brazil":"america","Canada":"america",
  "Chile":"america","Colombia":"america","Costa Rica":"america","Cuba":"america",
  "Dominican Rep.":"america","Ecuador":"america","Guatemala":"america",
  "Honduras":"america","Mexico":"america","Nicaragua":"america","Panama":"america",
  "Paraguay":"america","Peru":"america","United States of America":"america",
  "Uruguay":"america","Venezuela":"america",
  "Australia":"oceania","New Zealand":"oceania","Micronesia":"oceania"
};
const TARGET = new Set(Object.keys(COUNTRIES_ES));
const normalize = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const C = {bold:"#1D9E75",dim:isDark?"#3a3a38":"#D3D1C7",highlight:"#FAC775",
  correct:"#1D9E75",wrong:"#E24B4A",stroke:isDark?"rgba(255,255,255,0.13)":"#fff",
  numBg:"rgba(255,255,255,0.88)",numTxt:"#085041"};

let studyFilter_ = 'all';
let gameNums = {}, gameAnswers = {};
let transforms = {study:{k:1,x:0,y:0}, game:{k:1,x:0,y:0}};
let dragging = {study:false, game:false};
let dragStart = {};
let worldData = null;

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${t==='study'?1:2})`).classList.add('active');
  document.getElementById('screen-'+t).classList.add('active');
}

function getTransformStr(id){
  const t=transforms[id];
  return `translate(${t.x},${t.y}) scale(${t.k})`;
}
function applyTransform(id){
  const g = document.getElementById(id+'-g');
  if(g) g.setAttribute('transform', getTransformStr(id));
}
function zoomMap(id, factor){
  const t = transforms[id];
  t.k = Math.min(8, Math.max(1, t.k * factor));
  applyTransform(id);
}
function resetZoom(id){
  transforms[id]={k:1,x:0,y:0};
  applyTransform(id);
}

function setupDrag(id){
  const cont = document.getElementById(id+'-container');
  cont.addEventListener('mousedown', e=>{
    if(e.target.closest('.zoom-btns')) return;
    dragging[id]=true;
    dragStart[id]={x:e.clientX-transforms[id].x, y:e.clientY-transforms[id].y};
    cont.classList.add('grabbing');
  });
  window.addEventListener('mousemove', e=>{
    if(!dragging[id]) return;
    transforms[id].x = e.clientX - dragStart[id].x;
    transforms[id].y = e.clientY - dragStart[id].y;
    applyTransform(id);
  });
  window.addEventListener('mouseup', ()=>{ dragging[id]=false; cont.classList.remove('grabbing'); });
  cont.addEventListener('wheel', e=>{
    e.preventDefault();
    zoomMap(id, e.deltaY<0?1.15:1/1.15);
  }, {passive:false});
}

function buildStudyMap(features, pathFn){
  const svg = document.getElementById('study-svg');
  svg.innerHTML = '';
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.id = 'study-g';
  svg.appendChild(g);
  const tip = document.getElementById('study-tip');
  const ds = d3.select(g);

  ds.selectAll('path').data(features).join('path')
    .attr('d', pathFn)
    .attr('fill', d=>{
      const n=d.properties&&d.properties.name;
      if(!TARGET.has(n)) return C.dim;
      if(studyFilter_!=='all' && REGION_MAP[n]!==studyFilter_) return isDark?"#1a3a2a":"#9FE1CB";
      return C.bold;
    })
    .attr('opacity', d=>{
      const n=d.properties&&d.properties.name;
      if(!TARGET.has(n)) return 1;
      if(studyFilter_==='all') return 1;
      return REGION_MAP[n]===studyFilter_ ? 1 : 0.3;
    })
    .attr('stroke', C.stroke).attr('stroke-width',0.4)
    .style('cursor', d=> TARGET.has(d.properties&&d.properties.name)?'pointer':'default')
    .on('mousemove', function(ev,d){
      const n=d.properties&&d.properties.name;
      const es=COUNTRIES_ES[n]; if(!es) return;
      d3.select(this).attr('fill',C.highlight);
      const rect = document.getElementById('study-container').getBoundingClientRect();
      tip.style.display='block';
      tip.style.left=(ev.clientX-rect.left+12)+'px';
      tip.style.top=(ev.clientY-rect.top-30)+'px';
      tip.textContent=es;
    })
    .on('mouseleave', function(ev,d){
      const n=d.properties&&d.properties.name;
      d3.select(this).attr('fill', ()=>{
        if(!TARGET.has(n)) return C.dim;
        if(studyFilter_!=='all'&&REGION_MAP[n]!==studyFilter_) return isDark?"#1a3a2a":"#9FE1CB";
        return C.bold;
      }).attr('opacity',()=>{
        if(!TARGET.has(n)) return 1;
        if(studyFilter_==='all') return 1;
        return REGION_MAP[n]===studyFilter_?1:0.3;
      });
      tip.style.display='none';
    });

  const targetFeats = features.filter(d=>TARGET.has(d.properties&&d.properties.name));
  ds.selectAll('text.lbl').data(targetFeats).join('text')
    .attr('class','lbl')
    .attr('transform', d=>{ const c=pathFn.centroid(d); return `translate(${c[0]},${c[1]})`; })
    .attr('text-anchor','middle').attr('dy','0.35em')
    .style('font-size','5.5px').style('font-family','var(--font-sans)')
    .style('fill', isDark?'#fff':'#04342C').style('font-weight','500')
    .style('pointer-events','none').style('paint-order','stroke')
    .style('stroke', isDark?'#085041':'#E1F5EE').style('stroke-width','2.5px')
    .text(d=>{ const es=COUNTRIES_ES[d.properties.name]||''; return es.length>14?es.split(' ').slice(0,2).join(' '):es; });
}

function studyFilter(r, btn){
  studyFilter_=r;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(worldData) buildStudyMap(worldData.features, worldData.pathFn);
}

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildGameMap(features, pathFn){
  const svg = document.getElementById('game-svg');
  svg.innerHTML='';
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.id='game-g'; svg.appendChild(g);
  const tip = document.getElementById('game-tip');
  const ds = d3.select(g);
  const targetFeats = features.filter(d=>TARGET.has(d.properties&&d.properties.name));
  const shuffled = shuffle(targetFeats);
  gameNums={};
  shuffled.forEach((f,i)=>{ gameNums[f.properties.name]=i+1; });

  ds.selectAll('path').data(features).join('path')
    .attr('d', pathFn)
    .attr('fill', d=>TARGET.has(d.properties&&d.properties.name)?'#5DCAA5':C.dim)
    .attr('stroke', C.stroke).attr('stroke-width',0.4)
    .attr('id', d=>{ const n=d.properties&&d.properties.name; return TARGET.has(n)?'gp-'+gameNums[n]:'';})
    .on('mousemove', function(ev,d){
      const n=d.properties&&d.properties.name;
      if(!TARGET.has(n)) return;
      const num=gameNums[n];
      const rect=document.getElementById('game-container').getBoundingClientRect();
      tip.style.display='block';
      tip.style.left=(ev.clientX-rect.left+12)+'px';
      tip.style.top=(ev.clientY-rect.top-30)+'px';
      tip.textContent='País #'+num;
      document.getElementById('ainp-'+num)&&document.getElementById('ainp-'+num).focus();
    })
    .on('mouseleave', ()=>tip.style.display='none');

  targetFeats.forEach(f=>{
    const n=f.properties.name;
    const num=gameNums[n];
    const c=pathFn.centroid(f);
    if(isNaN(c[0])||isNaN(c[1])) return;
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    const label=String(num);
    const w=label.length>2?14:11; const h=8;
    bg.setAttribute('x',c[0]-w/2); bg.setAttribute('y',c[1]-h/2);
    bg.setAttribute('width',w); bg.setAttribute('height',h);
    bg.setAttribute('rx',2); bg.setAttribute('fill',C.numBg);
    bg.setAttribute('opacity','0.92'); bg.style.pointerEvents='none';
    txt.setAttribute('x',c[0]); txt.setAttribute('y',c[1]);
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','central');
    txt.style.fontSize='5px'; txt.style.fontWeight='600';
    txt.style.fontFamily='var(--font-sans)'; txt.style.fill=C.numTxt;
    txt.style.pointerEvents='none'; txt.textContent=label;
    g.appendChild(bg); g.appendChild(txt);
  });

  const grid = document.getElementById('answers-grid');
  grid.innerHTML='';
  const sorted = Object.entries(gameNums).sort((a,b)=>a[1]-b[1]);
  sorted.forEach(([engName, num])=>{
    const es = COUNTRIES_ES[engName];
    const row = document.createElement('div');
    row.className='answer-row';
    row.innerHTML=`<span class="ans-num">${num}.</span><input class="ans-input" id="ainp-${num}" data-eng="${engName}" data-es="${es}" placeholder="País #${num}" autocomplete="off">`;
    grid.appendChild(row);
  });
  document.querySelectorAll('.ans-input').forEach(inp=>{
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ checkOne(inp); focusNext(inp); }
    });
    inp.addEventListener('input', ()=>{ inp.classList.remove('correct','wrong'); });
  });
  gameAnswers={};
  updateGameStats();
  document.getElementById('final-badge').style.display='none';
}

function checkOne(inp){
  const es=inp.dataset.es;
  const val=inp.value.trim();
  if(!val) return;
  const ok = normalize(val)===normalize(es);
  inp.classList.toggle('correct',ok);
  inp.classList.toggle('wrong',!ok);
  const num=inp.id.replace('ainp-','');
  gameAnswers[num]=ok;
  const pathEl=document.getElementById('gp-'+num);
  if(pathEl) pathEl.setAttribute('fill',ok?C.correct:C.wrong);
  updateGameStats();
}

function focusNext(inp){
  const all=[...document.querySelectorAll('.ans-input')];
  const idx=all.indexOf(inp);
  if(idx<all.length-1) all[idx+1].focus();
}

function checkAll(){
  document.querySelectorAll('.ans-input').forEach(inp=>checkOne(inp));
  const total=Object.keys(gameNums).length;
  const ok=Object.values(gameAnswers).filter(Boolean).length;
  const pts=ok*10;
  const badge=document.getElementById('final-badge');
  badge.style.display='inline-block';
  badge.textContent=`${ok}/${total} correctas · ${pts} puntos`;
}

function revealAll(){
  document.querySelectorAll('.ans-input').forEach(inp=>{
    inp.value=inp.dataset.es;
    inp.classList.add('correct'); inp.classList.remove('wrong');
    const num=inp.id.replace('ainp-','');
    gameAnswers[num]=true;
    const pathEl=document.getElementById('gp-'+num);
    if(pathEl) pathEl.setAttribute('fill',C.correct);
  });
  updateGameStats();
}

function updateGameStats(){
  const total=Object.keys(gameNums).length||100;
  const ok=Object.values(gameAnswers).filter(Boolean).length;
  const bad=Object.values(gameAnswers).filter(v=>v===false).length;
  const pts=ok*10 - bad*5;
  document.getElementById('g-correct').textContent=ok;
  document.getElementById('g-wrong').textContent=bad;
  document.getElementById('g-score').textContent=Math.max(0,pts);
  document.getElementById('g-pct').textContent=Math.round(ok/total*100)+'%';
}

function resetGame(){
  if(worldData) buildGameMap(worldData.features, worldData.pathFn);
  document.getElementById('final-badge').style.display='none';
}

setupDrag('study');
setupDrag('game');

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
  const features = topojson.feature(world, world.objects.countries).features;
  const proj = d3.geoNaturalEarth1().scale(153).translate([480,250]);
  const pathFn = d3.geoPath(proj);
  worldData = {features, pathFn};
  buildStudyMap(features, pathFn);
  buildGameMap(features, pathFn);
});
</script>
