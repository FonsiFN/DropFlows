<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌍 GeoMaestro - Aprende los 100 Países</title>
    <!-- Font Awesome Icons (alternativa a tabler icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== VARIABLES CSS ===== */
        :root {
            /* Light mode */
            --bg-page: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --card-bg-secondary: rgba(248, 250, 252, 0.95);
            --text-primary: #1a2a3a;
            --text-secondary: #5a6e7c;
            --border-light: rgba(0, 0, 0, 0.08);
            --border-medium: rgba(0, 0, 0, 0.12);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.12);
            --color-success: #1D9E75;
            --color-success-light: #E1F5EE;
            --color-error: #E24B4A;
            --color-error-light: #FCEBEB;
            --color-warning: #FAC775;
            --color-info: #5DCAA5;
            --color-primary-dark: #0a5c44;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
                --card-bg: rgba(28, 32, 41, 0.95);
                --card-bg-secondary: rgba(22, 26, 35, 0.95);
                --text-primary: #e8edf2;
                --text-secondary: #9aaebf;
                --border-light: rgba(255, 255, 255, 0.08);
                --border-medium: rgba(255, 255, 255, 0.12);
                --color-success-light: #1a3a2a;
                --color-error-light: #3a1a1a;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-page);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px 16px;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* === TABS === */
        .tabs {
            display: flex;
            gap: 12px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 6px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .tab {
            flex: 1;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }

        .tab i {
            font-size: 18px;
            transition: transform 0.2s;
        }

        .tab:hover {
            color: var(--text-primary);
            background: rgba(29, 158, 117, 0.1);
        }

        .tab.on {
            background: linear-gradient(135deg, #1D9E75, #0f7a5a);
            color: white;
            box-shadow: 0 4px 12px rgba(29, 158, 117, 0.3);
        }

        .tab.on i {
            transform: scale(1.05);
        }

        /* === FILTROS === */
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }

        .fb {
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
            letter-spacing: 0.5px;
        }

        .fb:hover {
            transform: translateY(-2px);
            border-color: var(--color-success);
            color: var(--color-success);
        }

        .fb.on {
            background: linear-gradient(135deg, #1D9E75, #0f7a5a);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(29, 158, 117, 0.3);
        }

        /* === MAPA === */
        .map-wrap {
            position: relative;
            width: 100%;
            height: 460px;
            border-radius: 20px;
            overflow: hidden;
            background: var(--card-bg-secondary);
            cursor: grab;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            transition: box-shadow 0.2s;
        }

        .map-wrap:hover {
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
        }

        .map-wrap.gr {
            cursor: grabbing;
        }

        #study-svg, #game-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* === ZOOM BAR === */
        .zoom-bar {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
        }

        .zb {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .zb:hover {
            transform: scale(1.05);
            background: var(--color-success);
            color: white;
            border-color: transparent;
        }

        /* === TOOLTIP === */
        .tip-float {
            position: absolute;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            pointer-events: none;
            display: none;
            z-index: 30;
            white-space: nowrap;
            box-shadow: var(--shadow-md);
            letter-spacing: 0.3px;
        }

        /* === LEYENDA === */
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--card-bg);
            padding: 5px 12px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-light);
        }

        .lsq {
            width: 12px;
            height: 12px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* === GAME LAYOUT === */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 20px;
            align-items: start;
        }

        /* === SIDEBAR === */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* === SCOREBOARD === */
        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .sc {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 14px 8px;
            text-align: center;
            border: 1px solid var(--border-light);
            transition: transform 0.2s;
        }

        .sc:hover {
            transform: translateY(-3px);
        }

        .sc-n {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-success);
            background: linear-gradient(135deg, #1D9E75, #0f7a5a);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sc-l {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* === ANSWERS BOX === */
        .answers-box {
            border: 1px solid var(--border-light);
            border-radius: 20px;
            overflow: hidden;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-sm);
        }

        .answers-header {
            padding: 14px 16px;
            background: linear-gradient(135deg, rgba(29, 158, 117, 0.1), rgba(15, 122, 90, 0.05));
            border-bottom: 1px solid var(--border-light);
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .answers-list {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .answers-list::-webkit-scrollbar {
            width: 6px;
        }

        .answers-list::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 10px;
        }

        .answers-list::-webkit-scrollbar-thumb {
            background: var(--color-success);
            border-radius: 10px;
        }

        .ans-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.15s;
        }

        .ans-row.hl {
            background: linear-gradient(90deg, rgba(29, 158, 117, 0.15), transparent);
            border-left: 3px solid var(--color-success);
        }

        .ans-num {
            font-size: 11px;
            font-weight: 700;
            color: var(--color-success);
            min-width: 28px;
            text-align: right;
            flex-shrink: 0;
        }

        .ans-inp {
            flex: 1;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid var(--border-light);
            background: var(--card-bg-secondary);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .ans-inp:focus {
            border-color: var(--color-success);
            box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.1);
        }

        .ans-inp.ok {
            background: var(--color-success-light);
            border-color: var(--color-success);
            color: var(--color-success);
            font-weight: 600;
        }

        .ans-inp.bad {
            background: var(--color-error-light);
            border-color: var(--color-error);
            color: var(--color-error);
        }

        .ans-check {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === BOTONES === */
        .btn-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bp, .bs {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .bp {
            border: none;
            background: linear-gradient(135deg, #1D9E75, #0f7a5a);
            color: white;
            box-shadow: 0 4px 12px rgba(29, 158, 117, 0.3);
        }

        .bp:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(29, 158, 117, 0.4);
        }

        .bs {
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-secondary);
        }

        .bs:hover {
            background: var(--card-bg-secondary);
            border-color: var(--color-success);
            color: var(--color-success);
            transform: translateY(-2px);
        }

        .result-pill {
            background: linear-gradient(135deg, var(--color-success-light), rgba(29, 158, 117, 0.2));
            color: var(--color-success);
            border-radius: 40px;
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            display: none;
            border: 1px solid var(--color-success);
            backdrop-filter: blur(5px);
        }

        .hint-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 11px;
            font-weight: 500;
            pointer-events: none;
            white-space: nowrap;
            z-index: 15;
            letter-spacing: 0.3px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .game-layout {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .map-wrap {
                height: 380px;
            }
            
            .tabs {
                gap: 8px;
            }
            
            .tab {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .fb {
                padding: 6px 14px;
                font-size: 11px;
            }
        }

        /* Animaciones */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #s-study, #s-game {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="tabs">
        <button class="tab on" onclick="switchTab('study',this)"><i class="fas fa-book-open"></i> Estudiar</button>
        <button class="tab" onclick="switchTab('game',this)"><i class="fas fa-trophy"></i> Jugar</button>
    </div>

    <div id="s-study">
        <div class="filters">
            <button class="fb on" onclick="sfilt('all',this)">🌍 Todos</button>
            <button class="fb" onclick="sfilt('europa',this)">🇪🇺 Europa</button>
            <button class="fb" onclick="sfilt('africa',this)">🇿🇦 África</button>
            <button class="fb" onclick="sfilt('asia',this)">🇨🇳 Asia</button>
            <button class="fb" onclick="sfilt('america',this)">🌎 América</button>
            <button class="fb" onclick="sfilt('oceania',this)">🇦🇺 Oceanía</button>
        </div>
        <div class="map-wrap" id="swrap">
            <svg id="study-svg" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
            <div class="zoom-bar">
                <button class="zb" onclick="zm('s',1.35)">+</button>
                <button class="zb" onclick="zm('s',1/1.35)">−</button>
                <button class="zb" onclick="zr('s')" style="font-size:14px">↺</button>
            </div>
            <div class="tip-float" id="stip"></div>
            <div class="hint-bar"><i class="fas fa-hand-peace"></i> Arrastra · Zoom · Pasa el cursor</div>
        </div>
        <div class="legend">
            <div class="leg"><div class="lsq" style="background:#1D9E75"></div>🌟 Países destacados (100)</div>
            <div class="leg"><div class="lsq" style="background:#B4B2A9"></div>🌊 Territorios</div>
        </div>
    </div>

    <div id="s-game" style="display:none">
        <div class="game-layout">
            <div>
                <div class="map-wrap" id="gwrap">
                    <svg id="game-svg" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
                    <div class="zoom-bar">
                        <button class="zb" onclick="zm('g',1.35)">+</button>
                        <button class="zb" onclick="zm('g',1/1.35)">−</button>
                        <button class="zb" onclick="zr('g')" style="font-size:14px">↺</button>
                    </div>
                    <div class="tip-float" id="gtip"></div>
                    <div class="hint-bar" id="ghint"><i class="fas fa-mouse-pointer"></i> Haz clic en un país</div>
                </div>
                <div class="legend">
                    <div class="leg"><div class="lsq" style="background:#5DCAA5"></div>📌 Por identificar</div>
                    <div class="leg"><div class="lsq" style="background:#1D9E75"></div>✅ Correcto</div>
                    <div class="leg"><div class="lsq" style="background:#E24B4A"></div>❌ Incorrecto</div>
                    <div class="leg"><div class="lsq" style="background:#FAC775"></div>🎯 Seleccionado</div>
                </div>
            </div>
            <div class="sidebar">
                <div class="scoreboard">
                    <div class="sc"><div class="sc-n" id="gc">0</div><div class="sc-l">Correctas</div></div>
                    <div class="sc"><div class="sc-n" id="gw">0</div><div class="sc-l">Errores</div></div>
                    <div class="sc"><div class="sc-n" id="gp">0</div><div class="sc-l">Puntos</div></div>
                    <div class="sc"><div class="sc-n" id="gpct">0%</div><div class="sc-l">Completado</div></div>
                </div>
                <div class="answers-box">
                    <div class="answers-header">
                        <span><i class="fas fa-list"></i> Lista de países</span>
                        <span id="ans-counter" style="font-size:11px; font-weight:600">0/100</span>
                    </div>
                    <div class="answers-list" id="alist"></div>
                </div>
                <div class="btn-row">
                    <button class="bp" onclick="checkAll()"><i class="fas fa-check-double"></i> Comprobar todo</button>
                    <button class="bs" onclick="revealAll()"><i class="fas fa-eye"></i> Ver solución</button>
                    <button class="bs" onclick="resetGame()"><i class="fas fa-sync-alt"></i> Nueva partida</button>
                </div>
                <div class="result-pill" id="rpill"></div>
            </div>
        </div>
    </div>
</div>

  "Afghanistan":"asia","Saudi Arabia":"asia","Bangladesh":"asia","China":"asia",
  "North Korea":"asia","South Korea":"asia","United Arab Emirates":"asia",
  "Philippines":"asia","India":"asia","Indonesia":"asia","Iraq":"asia","Iran":"asia",
  "Israel":"asia","Japan":"asia","Jordan":"asia","Kuwait":"asia","Lebanon":"asia",
  "Malaysia":"asia","Maldives":"asia","Mongolia":"asia","Nepal":"asia",
  "Pakistan":"asia","Sri Lanka":"asia","Syria":"asia","Thailand":"asia",
  "Turkey":"asia","Vietnam":"asia",
  "Argentina":"america","Bolivia":"america","Brazil":"america","Canada":"america",
  "Chile":"america","Colombia":"america","Costa Rica":"america","Cuba":"america",
  "Dominican Rep.":"america","Ecuador":"america","Guatemala":"america",
  "Honduras":"america","Mexico":"america","Nicaragua":"america","Panama":"america",
  "Paraguay":"america","Peru":"america","United States of America":"america",
  "Uruguay":"america","Venezuela":"america",
  "Australia":"oceania","New Zealand":"oceania","Micronesia":"oceania"
};
const TARGET = new Set(Object.keys(CE));
const norm = s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
const isDark = matchMedia('(prefers-color-scheme:dark)').matches;

let WD = null;
let sFilter = 'all';
let gNums = {}, gState = {};
let selectedNum = null;
let T = {s:{k:1,x:0,y:0}, g:{k:1,x:0,y:0}};
let drag = {s:false, g:false};
let ds0 = {};

function switchTab(t, btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('s-study').style.display = t==='study'?'block':'none';
  document.getElementById('s-game').style.display = t==='game'?'block':'none';
}

function getT(id){ return `translate(${T[id].x},${T[id].y}) scale(${T[id].k})`; }
function applyT(id){ const g=document.getElementById(id+'g'); if(g) g.setAttribute('transform',getT(id)); }
function zm(id, f){
  T[id].k = Math.min(10, Math.max(1, T[id].k*f));
  applyT(id);
  if(id==='g') updateNumLabels();
}
function zr(id){ T[id]={k:1,x:0,y:0}; applyT(id); if(id==='g') updateNumLabels(); }

function setupDrag(id, wrapId){
  const el = document.getElementById(wrapId);
  el.addEventListener('mousedown', e=>{
    if(e.target.closest('.zoom-bar')) return;
    drag[id]=true; ds0[id]={x:e.clientX-T[id].x, y:e.clientY-T[id].y};
    el.classList.add('gr');
  });
  window.addEventListener('mousemove', e=>{
    if(!drag[id]) return;
    T[id].x=e.clientX-ds0[id].x; T[id].y=e.clientY-ds0[id].y;
    applyT(id); if(id==='g') updateNumLabels();
  });
  window.addEventListener('mouseup', ()=>{ drag[id]=false; el.classList.remove('gr'); });
  el.addEventListener('wheel', e=>{
    e.preventDefault();
    const f = e.deltaY<0?1.15:1/1.15;
    const rect = el.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const px = (mx - T[id].x) / T[id].k;
    const py = (my - T[id].y) / T[id].k;
    T[id].k = Math.min(10, Math.max(1, T[id].k*f));
    T[id].x = mx - px * T[id].k;
    T[id].y = my - py * T[id].k;
    applyT(id); if(id==='g') updateNumLabels();
  },{passive:false});
}

function buildStudyMap(feats, pf){
  const svg = d3.select('#study-svg');
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('id','sg');
  const tip = document.getElementById('stip');
  const wrap = document.getElementById('swrap');

  g.selectAll('path').data(feats).join('path')
    .attr('d', pf)
    .attr('fill', d=>getFillStudy(d.properties&&d.properties.name))
    .attr('opacity', d=>getOpStudy(d.properties&&d.properties.name))
    .attr('stroke', isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.1)')
    .attr('stroke-width', 0.6)
    .style('cursor', d=>TARGET.has(d.properties&&d.properties.name)?'pointer':'default')
    .on('mousemove', function(ev,d){
      const n=d.properties&&d.properties.name;
      const es=CE[n]; if(!es) return;
      d3.select(this).attr('fill','#FAC775').attr('stroke','#FAC775').attr('stroke-width',1);
      const r=wrap.getBoundingClientRect();
      tip.style.left=(ev.clientX-r.left+12)+'px';
      tip.style.top=(ev.clientY-r.top-32)+'px';
      tip.style.display='block'; tip.textContent=es;
    })
    .on('mouseleave', function(ev,d){
      const n=d.properties&&d.properties.name;
      d3.select(this).attr('fill',getFillStudy(n)).attr('stroke',isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.1)').attr('stroke-width',0.6).attr('opacity',getOpStudy(n));
      tip.style.display='none';
    });

  const tf = feats.filter(d=>TARGET.has(d.properties&&d.properties.name));
  g.selectAll('text.sl').data(tf).join('text')
    .attr('class','sl')
    .attr('transform',d=>{ const c=pf.centroid(d); return `translate(${c[0]},${c[1]})`; })
    .attr('text-anchor','middle').attr('dy','0.35em')
    .style('font-size','5.5px').style('font-family','inherit')
    .style('fill',isDark?'#fff':'#04342C').style('font-weight','600')
    .style('pointer-events','none').style('paint-order','stroke')
    .style('stroke',isDark?'#085041':'#E1F5EE').style('stroke-width','2.5px')
    .text(d=>{ const es=CE[d.properties.name]||''; return es.length>14?es.split(' ').slice(0,2).join(' '):es; });
}

function getFillStudy(n){
  if(!TARGET.has(n)) return isDark?'#2a2e3a':'#C8D0D8';
  if(sFilter!=='all' && RM[n]!==sFilter) return isDark?'#1a3a2a':'#9FE1CB';
  return '#1D9E75';
}
function getOpStudy(n){
  if(!TARGET.has(n)) return 1;
  if(sFilter==='all') return 1;
  return RM[n]===sFilter?1:0.3;
}

function sfilt(r, btn){
  sFilter=r;
  document.querySelectorAll('#s-study .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(WD){ buildStudyMap(WD.feats, WD.pf); applyT('s'); }
}

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function buildGameMap(feats, pf){
  const svg = d3.select('#game-svg');
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('id','gg');
  const tip = document.getElementById('gtip');
  const wrap = document.getElementById('gwrap');
  const tg = feats.filter(d=>TARGET.has(d.properties&&d.properties.name));
  const shuffled = shuffle(tg);
  gNums={}; gState={};
  shuffled.forEach((f,i)=>{ gNums[f.properties.name]=i+1; });

  g.selectAll('path').data(feats).join('path')
    .attr('d',pf)
    .attr('fill',d=>TARGET.has(d.properties&&d.properties.name)?'#5DCAA5':(isDark?'#2a2e3a':'#C8D0D8'))
    .attr('stroke',isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.1)')
    .attr('stroke-width',0.6)
    .attr('id',d=>{ const n=d.properties&&d.properties.name; return TARGET.has(n)?'gpath-'+gNums[n]:''; })
    .style('cursor',d=>TARGET.has(d.properties&&d.properties.name)?'pointer':'default')
    .on('click', function(ev,d){
      const n=d.properties&&d.properties.name;
      if(!TARGET.has(n)) return;
      const num=gNums[n];
      if(gState[num]==='correct') return;
      selectNum(num);
    })
    .on('mousemove', function(ev,d){
      const n=d.properties&&d.properties.name;
      if(!TARGET.has(n)) return;
      const num=gNums[n];
      const r=wrap.getBoundingClientRect();
      tip.style.left=(ev.clientX-r.left+12)+'px';
      tip.style.top=(ev.clientY-r.top-32)+'px';
      tip.style.display='block';
      if(gState[num]==='correct') tip.innerHTML='✅ '+CE[n];
      else tip.innerHTML='📍 País #'+num;
    })
    .on('mouseleave',()=>tip.style.display='none');

  const labsG = g.append('g').attr('id','num-labels');
  tg.forEach(f=>{
    const n=f.properties.name;
    const num=gNums[n];
    const c=pf.centroid(f);
    if(isNaN(c[0])||isNaN(c[1])) return;
    const fg=labsG.append('g').attr('id','glbl-'+num).attr('transform',`translate(${c[0]},${c[1]})`).style('pointer-events','none');
    fg.append('rect').attr('id','glbg-'+num).attr('rx',2).attr('fill','rgba(0,0,0,0.7)');
    fg.append('text').attr('id','gltxt-'+num).attr('text-anchor','middle').attr('dominant-baseline','central')
      .style('font-family','monospace').style('fill','white').style('font-weight','bold');
  });
  updateNumLabels();
  buildAnswerList();
  updateStats();
  selectedNum=null;
  document.getElementById('rpill').style.display='none';
}

function updateNumLabels(){
  const k = T.g.k;
  const baseSize = 6;
  const sz = Math.max(3, baseSize / k);
  Object.entries(gNums).forEach(([n,num])=>{
    const txt = document.getElementById('gltxt-'+num);
    const bg = document.getElementById('glbg-'+num);
    if(!txt||!bg) return;
    const label = String(num);
    txt.style.fontSize = sz+'px';
    txt.textContent = label;
    const w = label.length>2 ? sz*3 : sz*2.2;
    const h = sz*1.4;
    bg.setAttribute('x',-w/2); bg.setAttribute('y',-h/2);
    bg.setAttribute('width',w); bg.setAttribute('height',h);
  });
}

function selectNum(num){
  selectedNum=num;
  document.querySelectorAll('[id^="gpath-"]').forEach(el=>{
    const n2=parseInt(el.id.replace('gpath-',''));
    if(gState[n2]==='correct') return;
    if(gState[n2]==='wrong'){ el.setAttribute('fill','#E24B4A'); return; }
    el.setAttribute('fill', n2===num?'#FAC775':'#5DCAA5');
  });
  const row = document.getElementById('arow-'+num);
  if(row){
    row.scrollIntoView({block:'nearest',behavior:'smooth'});
    document.querySelectorAll('.ans-row').forEach(r=>r.classList.remove('hl'));
    row.classList.add('hl');
    const inp = document.getElementById('ainp-'+num);
    if(inp && gState[num]!=='correct') inp.focus();
  }
  document.getElementById('ghint').innerHTML = '<i class="fas fa-pen"></i> País #'+num+' seleccionado — escribe el nombre';
}

function buildAnswerList(){
  const list = document.getElementById('alist');
  list.innerHTML='';
  const sorted = Object.entries(gNums).sort((a,b)=>a[1]-b[1]);
  sorted.forEach(([eng,num])=>{
    const es=CE[eng];
    const row=document.createElement('div');
    row.className='ans-row'; row.id='arow-'+num;
    row.innerHTML=`<span class="ans-num">${num}.</span><input class="ans-inp" id="ainp-${num}" data-eng="${eng}" data-es="${es}" placeholder="Escribe aquí..." autocomplete="off" spellcheck="false"><span class="ans-check" id="achk-${num}"></span>`;
    list.appendChild(row);
    const inp=row.querySelector('input');
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ checkOne(num); }
    });
    inp.addEventListener('focus',()=>{
      if(gState[num]==='correct') return;
      selectNum(num);
    });
    inp.addEventListener('input',()=>{
      if(gState[num]) return;
      inp.classList.remove('ok','bad');
      document.getElementById('achk-'+num).textContent='';
    });
    row.addEventListener('click',()=>{
      if(gState[num]==='correct') return;
      selectNum(num);
    });
  });
}

function checkOne(num){
  const inp=document.getElementById('ainp-'+num);
  if(!inp) return;
  const es=inp.dataset.es;
  const val=inp.value.trim();
  if(!val) return;
  const ok=norm(val)===norm(es);
  gState[num]=ok?'correct':'wrong';
  inp.classList.toggle('ok',ok); inp.classList.toggle('bad',!ok);
  inp.disabled=ok;
  document.getElementById('achk-'+num).innerHTML=ok?'✓':'✗';
  document.getElementById('achk-'+num).style.color=ok?'#1D9E75':'#E24B4A';
  const path=document.getElementById('gpath-'+num);
  if(path) path.setAttribute('fill',ok?'#1D9E75':'#E24B4A');
  if(!ok){ setTimeout(()=>{ inp.classList.remove('bad'); inp.disabled=false; document.getElementById('achk-'+num).textContent=''; gState[num]=null; const p2=document.getElementById('gpath-'+num); if(p2) p2.setAttribute('fill',selectedNum===num?'#FAC775':'#5DCAA5'); }, 900); }
  updateStats();
  if(ok && selectedNum===num){ const next=findNextUnanswered(num); if(next) selectNum(next); }
}

function findNextUnanswered(from){
  const nums=Object.values(gNums).sort((a,b)=>a-b);
  const idx=nums.indexOf(from);
  for(let i=idx+1;i<nums.length;i++){ if(gState[nums[i]]!=='correct') return nums[i]; }
  for(let i=0;i<idx;i++){ if(gState[nums[i]]!=='correct') return nums[i]; }
  return null;
}

function checkAll(){
  Object.values(gNums).sort((a,b)=>a-b).forEach(num=>{
    if(gState[num]!=='correct') checkOne(num);
  });
  showResult();
}

function revealAll(){
  Object.entries(gNums).forEach(([eng,num])=>{
    if(gState[num]==='correct') return;
    const inp=document.getElementById('ainp-'+num);
    if(inp){ inp.value=CE[eng]; inp.classList.add('ok'); inp.classList.remove('bad'); inp.disabled=true; }
    document.getElementById('achk-'+num).innerHTML='✓';
    document.getElementById('achk-'+num).style.color='#1D9E75';
    gState[num]='correct';
    const p=document.getElementById('gpath-'+num);
    if(p) p.setAttribute('fill','#1D9E75');
  });
  updateStats(); showResult();
}

function resetGame(){
  T.g={k:1,x:0,y:0}; applyT('g');
  if(WD) buildGameMap(WD.feats, WD.pf);
}

function updateStats(){
  const ok=Object.values(gState).filter(v=>v==='correct').length;
  const bad=Object.values(gState).filter(v=>v==='wrong').length;
  const pts=Math.max(0,ok*10-bad*3);
  document.getElementById('gc').textContent=ok;
  document.getElementById('gw').textContent=bad;
  document.getElementById('gp').textContent=pts;
  document.getElementById('gpct').textContent=Math.round(ok/100*100)+'%';
  document.getElementById('ans-counter').innerHTML=ok+'/100';
}

function showResult(){
  const ok=Object.values(gState).filter(v=>v==='correct').length;
  const pill=document.getElementById('rpill');
  pill.style.display='block';
  pill.innerHTML='🎉 '+ok+'/100 correctas · '+Math.max(0,ok*10)+' puntos 🎉';
  setTimeout(()=>{
    if(ok===100) alert('🏆 ¡Felicidades! Has completado todos los países 🏆');
  },100);
}

setupDrag('s','swrap');
setupDrag('g','gwrap');

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
  const feats=topojson.feature(world,world.objects.countries).features;
  const proj=d3.geoNaturalEarth1().scale(153).translate([480,250]);
  const pf=d3.geoPath(proj);
  WD={feats,pf};
  buildStudyMap(feats,pf);
  buildGameMap(feats,pf);
});
</script>
